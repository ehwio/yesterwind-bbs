services:
  bbs:
    build: .
    image: yesterwind-bbs
    ports:
      - "${BBS_PORT:-23}:23"
    volumes:
      - bbs-data:/app/data
    env_file:
      - .env          # copy from .env.example, never commit
    restart: unless-stopped
    healthcheck:
      # TCP connect on port 23 — no bytes sent, just checks the port is up
      test: ["CMD", "python3", "-c",
             "import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(s.connect_ex(('localhost',23)))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bbs-data:
